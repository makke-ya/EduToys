            <!-- 今後追加されるゲームのプレースホルダー -->

    <footer class="text-center mt-16 text-gray-500 font-medium pb-8">
        <p class="mb-2">&copy; EduToys Project.</p>
        <p class="text-sm opacity-60">音源提供：Springin' Sound Stock / 音声合成：VOICEVOX（ずんだもん）</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const bgm = new Audio('static/sounds/bgm/Pops_02.mp3');
            bgm.loop = true;
            
            // BGMの目標音量
            const targetVolume = 0.4;

            // フェードインしながら再生する関数
            const fadeInBgm = () => {
                if (!bgm.paused && bgm.volume === targetVolume) return; // 既に再生中なら何もしない
                
                bgm.volume = 0;
                bgm.play().then(() => {
                    let vol = 0;
                    const fadeInterval = setInterval(() => {
                        if (vol < targetVolume) {
                            vol += 0.05;
                            bgm.volume = Math.min(vol, targetVolume);
                        } else {
                            clearInterval(fadeInterval);
                        }
                    }, 100);
                }).catch(e => console.log('BGM resume failed:', e));
            };

            const startOverlay = document.getElementById('start-overlay');
            const btnStart = document.getElementById('btn-start');
            const gameOverlay = document.getElementById('game-overlay');
            const gameFrame = document.getElementById('game-frame');

            btnStart.addEventListener('click', () => {
                sessionStorage.setItem('edutoys_started', 'true');
                fadeInBgm();
                startOverlay.style.opacity = '0';
                setTimeout(() => startOverlay.classList.add('hidden'), 300);
            });

            // セッション内で一度でも「はじめる」を押したことがあれば、オーバーレイを表示しない
            if (sessionStorage.getItem('edutoys_started') === 'true') {
                startOverlay.classList.add('hidden');
                document.body.addEventListener('click', () => {
                    fadeInBgm();
                }, { once: true });
            }

            // Iframeでゲームを開く
            window.openInIframe = (url) => {
                gameFrame.src = url;
                gameOverlay.classList.remove('hidden');
                // ゲーム画面が開いている間は親のBGMを一時停止する
                bgm.pause();
            };

            // 子画面（Iframe）からのメッセージを受け取る
            window.addEventListener('message', (event) => {
                if (event.data === 'closeGame') {
                    gameOverlay.classList.add('hidden');
                    gameFrame.src = 'about:blank';
                    // 親画面のBGMをフェードインで再開する
                    fadeInBgm();
                }
            });
        });
    </script>
</body>
</html>
