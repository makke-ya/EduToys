<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>すくすく ぷれー</title>
    
    <!-- 外部ライブラリ (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>

    <!-- 共通CSS -->
    <link rel="stylesheet" href="static/common/css/game_style.css">
    <link rel="stylesheet" href="static/common/css/sticker.css">

    <!-- フォント -->
    <style>
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Rounded M+ 1c', 'Meiryo', sans-serif;
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'edu-bg': '#fdfaf0',
                        'edu-text': '#5a4b41',
                        'edu-orange': '#ff8c00',
                        'edu-green': '#4caf50',
                        'edu-pink': '#f48fb1',
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-edu-bg text-edu-text font-sans overflow-x-hidden select-none">
    <div id="app" class="min-h-screen min-h-[100dvh] w-full flex flex-col items-center justify-start relative">
        <div class="app-background pointer-events-none absolute inset-0 overflow-hidden" aria-hidden="true">
            <div class="app-background__orb app-background__orb--orange"></div>
            <div class="app-background__orb app-background__orb--green"></div>
            <div class="app-background__orb app-background__orb--pink"></div>
            <div class="app-background__cloud app-background__cloud--left"></div>
            <div class="app-background__cloud app-background__cloud--right"></div>
        </div>
        
        <!-- スタート画面 (AudioContext許可のため) -->
        <div v-if="!isStarted" @click="startGame" class="start-screen absolute inset-0 z-50 flex flex-col items-center justify-center cursor-pointer">
            <h1 class="text-4xl font-bold text-edu-orange mb-8 animate-bounce">すくすく ぷれー</h1>
            <button class="edu-btn bg-edu-green text-white px-8 py-4 rounded-full text-2xl font-bold animate-pulse pointer-events-none">
                はじめる
            </button>
        </div>

        <!-- ヘッダー (ホーム・シールちょう画面で表示) -->
        <header v-if="currentView !== 'game'" class="w-full max-w-4xl px-6 py-4 flex justify-between items-center absolute top-0 z-40">
            <h1 class="text-3xl font-bold text-edu-orange drop-shadow-sm">すくすく ぷれー</h1>
            <button @click="showStickerBook" v-if="currentView === 'home'" class="edu-btn bg-edu-pink text-white px-6 py-3 rounded-full text-xl font-bold shadow-lg transform transition active:scale-95">
                シールちょう
            </button>
            <button @click="showHome" v-if="currentView === 'sticker_book'" class="edu-btn bg-white text-edu-text px-6 py-3 rounded-full text-xl font-bold shadow-lg border-4 border-gray-200 transform transition active:scale-95">
                ◀ もどる
            </button>
        </header>

        <!-- メインコンテンツ -->
        <main class="w-full max-w-4xl flex-1 min-h-0 flex flex-col pt-24 pb-6 px-4 relative z-10">
            
            <!-- ホームビュー (ゲーム選択) -->
            <div v-show="currentView === 'home'" class="flex-1 min-h-0 flex flex-col relative">
                <div class="home-panel" aria-hidden="true"></div>
                <div class="relative flex-1 flex flex-col p-4 md:p-6">
                    <h2 class="text-2xl md:text-3xl mb-6 text-center font-bold">あそぶゲームをえらんでね！</h2>
                    
                    <div class="grid grid-cols-2 md:grid-cols-3 gap-6 overflow-y-auto pb-4 p-2">
                        <div v-for="game in games" :key="game.id" @click="loadGame(game.id)" class="bg-white/95 rounded-3xl p-4 shadow-md border-4 border-white cursor-pointer transform transition hover:-translate-y-1 active:scale-95 flex flex-col items-center justify-center aspect-square">
                            <div class="w-24 h-24 bg-orange-50 rounded-2xl mb-4 flex items-center justify-center overflow-hidden border-2 border-orange-100">
                                <img :src="game.thumbnail" :alt="game.name" class="w-full h-full object-cover">
                            </div>
                            <span class="text-lg font-bold text-center">{{ game.name }}</span>
                            <span class="text-sm bg-edu-orange text-white px-3 py-1 rounded-full mt-2">{{ game.category }}</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- シールちょうビュー -->
            <div
                v-show="currentView === 'sticker_book'"
                class="sticker-book-shell flex-1 min-h-0 flex flex-col"
            >
                <div class="sticker-book-panel flex-1 flex flex-col">
                    <div class="sticker-book-header">
                        <div>
                            <h2 class="text-3xl md:text-4xl font-bold text-edu-green">シールちょう</h2>
                            <p class="text-lg md:text-xl text-edu-text mt-2">あつめた シールを ぺたっと はろう！</p>
                        </div>
                        <div class="sticker-page-chip">{{ currentStickerPage + 1 }} / {{ stickerPageCount }} ぺーじ</div>
                    </div>

                    <div class="sticker-board-row">
                        <button type="button" @click="changeStickerPage(-1)" class="sticker-nav-btn edu-btn">◀</button>

                        <div ref="stickerBoard" class="sticker-board">
                            <div v-if="!placedStickers.length" class="sticker-book-empty">
                                まだ はっていないよ
                            </div>

                            <div
                                v-for="sticker in placedStickers"
                                :key="sticker.key"
                                class="sticker-board__item"
                                :style="placedStickerStyle(sticker)"
                            >
                                <img :src="sticker.path" :alt="sticker.name" class="sticker-board__image">
                            </div>

                            <div class="sticker-book-hint">
                                {{ draggingSticker ? 'たいしに はなして はろう！' : 'したの シールを つかんで はろう！' }}
                            </div>
                        </div>

                        <button type="button" @click="changeStickerPage(1)" class="sticker-nav-btn edu-btn">▶</button>
                    </div>

                    <p v-if="stickerCatalogError" class="sticker-book-error">{{ stickerCatalogError }}</p>

                    <div class="sticker-tray">
                        <div class="sticker-tray__header">まだ はっていない シール</div>
                        <div v-if="availableStickerEntries.length" class="sticker-tray__grid">
                            <button
                                v-for="sticker in availableStickerEntries"
                                :key="sticker.key"
                                type="button"
                                class="sticker-tray__item edu-btn"
                                @pointerdown="startStickerDrag(sticker, $event)"
                            >
                                <img :src="sticker.path" :alt="sticker.name" class="sticker-tray__image">
                                <span class="sticker-tray__label">{{ sticker.name }}</span>
                            </button>
                        </div>
                        <p v-else class="sticker-tray__empty">あたらしい シールを あつめてね！</p>
                    </div>
                </div>

                <div v-if="dragPreview.visible" class="sticker-drag-preview" :style="dragPreviewStyle">
                    <img :src="dragPreview.path" :alt="dragPreview.name" class="sticker-drag-preview__image">
                </div>
            </div>

            <!-- ゲームプレイビュー (動的コンテナ) -->
            <div v-show="currentView === 'game'" class="flex-1 w-full max-w-2xl mx-auto flex flex-col relative">
                <!-- もどるボタン (ゲーム外レイヤー) -->
                <button @click="showHome" class="absolute -top-16 left-0 edu-btn bg-white text-edu-text px-4 py-2 rounded-full text-lg font-bold shadow border-4 border-gray-200 z-50 active:scale-95">
                    ◀ もどる
                </button>

                <!-- ゲームUIコンテナ (DOM) -->
                <div id="game-ui-container" class="absolute inset-0 pointer-events-none z-10 flex flex-col">
                    <!-- start.html のUI要素がここにロードされる -->
                </div>

                <!-- ゲームキャンバスコンテナ (PixiJS) -->
                <div id="game-canvas-container" class="flex-1 w-full bg-white rounded-3xl overflow-hidden border-8 border-edu-orange shadow-lg relative z-0 pointer-events-auto">
                    <!-- PixiJSのCanvasがここに展開される -->
                </div>
            </div>

        </main>
    </div>

    <!-- メインロジック -->
    <script src="js/storage.js"></script>
    <script src="js/sticker-book.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
