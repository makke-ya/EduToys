                    <div class="h-40 bg-green-50 flex items-center justify-center text-7xl group-hover:scale-110 transition-transform">🐘</div>

                    <div class="h-40 bg-yellow-50 flex items-center justify-center text-7xl group-hover:scale-110 transition-transform">🔺</div>

                <!-- 004_number_tracing -->
                <button onclick="EduToys.loadGame('games/004_number_tracing/start.html')" class="group relative bg-white rounded-3xl shadow-lg border-4 border-pink-200 hover:border-pink-400 hover:-translate-y-2 transition-all duration-300 overflow-hidden text-left">
                    <div class="h-40 bg-pink-50 flex items-center justify-center text-7xl group-hover:scale-110 transition-transform">🖍️</div>
                    <div class="p-6">
                        <span class="inline-block bg-pink-500 text-white text-xs font-black px-3 py-1 rounded-full mb-2 shadow-sm">かず</span>
                        <h2 class="text-2xl font-black text-gray-800 mb-1">すうじをなぞろう</h2>

                </button>

                <!-- 005_connect_dots -->
                <button onclick="EduToys.loadGame('games/005_connect_dots/start.html')" class="group relative bg-white rounded-3xl shadow-lg border-4 border-green-200 hover:border-green-400 hover:-translate-y-2 transition-all duration-300 overflow-hidden text-left">
                    <div class="h-40 bg-green-50 flex items-center justify-center text-7xl group-hover:scale-110 transition-transform">✍️</div>

                <!-- 006_rocket_star -->

                    <div class="p-6">

                        <h2 class="text-2xl font-black text-gray-800 mb-1">ひらがななぞり</h2>

                <!-- 008_english_tracing -->
                <button onclick="EduToys.loadGame('games/008_english_tracing/start.html')" class="group relative bg-white rounded-3xl shadow-lg border-4 border-cyan-200 hover:border-cyan-400 hover:-translate-y-2 transition-all duration-300 overflow-hidden text-left">

                    <div class="p-6">

        </main>
    </div>

    <!-- ゲーム表示用コンテナ (iframeの代わり) -->
    <div id="game-viewport" class="hidden">
        <div id="game-content"></div>
    </div>

    <!-- スタートオーバーレイ -->
    <div id="start-overlay" class="fixed inset-0 bg-yellow-50 z-[300] flex flex-col items-center justify-center transition-opacity duration-500">
        <h1 class="text-6xl font-black text-orange-500 mb-8 animate-bounce drop-shadow-lg">EduToys</h1>
        <button id="btn-start" class="px-10 py-6 bg-yellow-400 hover:bg-yellow-500 text-white text-4xl font-bold rounded-full shadow-xl transition-transform active:scale-95 border-4 border-yellow-200">
            はじめる！ ▶
        </button>
    </div>

    <footer class="text-center mt-16 text-gray-500 font-medium pb-8">
        <p class="mb-2">&copy; EduToys Project.</p>
        <p class="text-sm opacity-60">音源提供：Springin' Sound Stock / 合成：VOICEVOX</p>
    </footer>

    <script src="static/common/js/game_utils.js"></script>
    <script src="static/common/js/sticker_system.js"></script>
    <script>
        /**
         * EduToys Core Manager
         */
        const EduToys = (() => {
            const state = {
                started: false,
                currentBgm: null,
                menuBgm: new Audio('static/sounds/bgm/Pops_02.mp3'),
                activeGameBgm: null
            };

            state.menuBgm.loop = true;

            const fadeInBgm = (audio, targetVol = 0.4) => {
                if (!audio) return;
                audio.volume = 0;
                audio.play().then(() => {
                    let vol = 0;
                    const interval = setInterval(() => {
                        vol += 0.05;
                        audio.volume = Math.min(vol, targetVol);
                        if (vol >= targetVol) clearInterval(interval);
                    }, 100);
                }).catch(e => console.error("Play failed", e));
            };

            const fadeOutBgm = (audio) => {
                if (!audio) return Promise.resolve();
                return new Promise(resolve => {
                    let vol = audio.volume;
                    const interval = setInterval(() => {
                        vol -= 0.05;
                        audio.volume = Math.max(0, vol);
                        if (vol <= 0) {
                            clearInterval(interval);
                            audio.pause();
                            resolve();
                        }
                    }, 50);
                });
            };

            return {
                init: () => {
                    const btnStart = document.getElementById('btn-start');
                    btnStart.addEventListener('click', () => {
                        state.started = true;
                        sessionStorage.setItem('edutoys_started', 'true');
                        document.getElementById('start-overlay').style.opacity = '0';
                        setTimeout(() => document.getElementById('start-overlay').classList.add('hidden'), 500);
                        fadeInBgm(state.menuBgm);
                    });

                    if (sessionStorage.getItem('edutoys_started') === 'true') {
                        document.getElementById('start-overlay').classList.add('hidden');
                        document.body.addEventListener('click', () => {
                            if (!state.started) {
                                state.started = true;
                                fadeInBgm(state.menuBgm);
                            }
                        }, { once: true });
                    }

                    // 戻るボタン等のメッセージ受け取り
                    window.addEventListener('message', (e) => {
                        if (e.data === 'closeGame') EduToys.closeGame();
                    });
                    
                    // SPA内での戻るボタン対応
                    window.addEventListener('popstate', () => {
                        if (document.getElementById('game-viewport').classList.contains('hidden')) return;
                        EduToys.closeGame(false);
                    });
                },

                loadGame: async (url) => {
                    console.log("Loading game:", url);
                    const viewport = document.getElementById('game-viewport');
                    const content = document.getElementById('game-content');
                    
                    // BGM切り替え
                    await fadeOutBgm(state.menuBgm);

                    try {
                        const response = await fetch(url);
                        const html = await response.text();
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(html, 'text/html');
                        
                        // Base URLをセットして相対パスを解決しやすくする
                        const gameBase = url.substring(0, url.lastIndexOf('/') + 1);
                        
                        // コンテンツの抽出 (bodyの中身)
                        content.innerHTML = doc.body.innerHTML;
                        
                        // スタイルの移行
                        document.querySelectorAll('.game-style').forEach(el => el.remove());
                        doc.querySelectorAll('link[rel="stylesheet"]').forEach(link => {
                            const newLink = document.createElement('link');
                            newLink.rel = 'stylesheet';
                            newLink.className = 'game-style';
                            newLink.href = link.getAttribute('href').startsWith('http') ? link.href : gameBase + link.getAttribute('href');
                            document.head.appendChild(newLink);
                        });

                        // スクリプトの実行
                        // Note: innerHTMLではscriptは走らないので手動で追加
                        doc.querySelectorAll('script').forEach(oldScript => {
                            const newScript = document.createElement('script');
                            newScript.className = 'game-script';
                            if (oldScript.src) {
                                newScript.src = oldScript.src.startsWith('http') ? oldScript.src : gameBase + oldScript.getAttribute('src');
                            } else {
                                newScript.textContent = oldScript.textContent;
                            }
                            document.body.appendChild(newScript);
                        });

                        viewport.classList.remove('hidden');
                        history.pushState({view: 'game'}, '', '#' + url);
                        
                        // 読み込み完了後にBGMがあれば自動再生されるはず (前のクリックが有効)
                    } catch (e) {
                        console.error("Game load failed", e);
                        fadeInBgm(state.menuBgm);
                    }
                },

                closeGame: (updateHistory = true) => {
                    document.getElementById('game-viewport').classList.add('hidden');
                    document.getElementById('game-content').innerHTML = '';
                    document.querySelectorAll('.game-style, .game-script').forEach(el => el.remove());
                    
                    // 各ゲームのBGMを止めるためのクリーンアップが必要な場合がある
                    // 今回はAudioオブジェクトを全て停止させる
                    document.querySelectorAll('audio').forEach(a => {
                        if (a !== state.menuBgm) {
                            a.pause();
                            a.remove();
                        }
                    });

                    fadeInBgm(state.menuBgm);
                    if (updateHistory) history.back();
                }
            };
        })();

        document.addEventListener('DOMContentLoaded', EduToys.init);
    </script>
</body>
</html>
