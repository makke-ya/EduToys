<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ほしあつめロケット - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../static/common/css/game_style.css">
    <style>
        body { 
            background: #000022;
            overflow: hidden; 
            margin: 0;
        }
        /* スクロールする宇宙背景 */
        .space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1a237e 0%, #000022 100%);
            z-index: -2;
        }
        .stars-overlay {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 160px 120px, #ddd, rgba(0,0,0,0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: spaceScroll 60s linear infinite;
            opacity: 0.5;
            z-index: -1;
        }
        @keyframes spaceScroll {
            from { transform: translateY(0); }
            to { transform: translateY(100px); }
        }

        #game-stage { touch-action: none; position: relative; width: 100%; height: 100%; }
        
        .rocket { 
            font-size: 6rem; 
            position: absolute; 
            z-index: 100; 
            pointer-events: auto; 
            user-select: none;
            cursor: grab;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.3));
            will-change: transform, left, top;
        }
        .rocket:active { cursor: grabbing; }

        .star { 
            font-size: 3.5rem; 
            position: absolute; 
            pointer-events: none; 
            z-index: 50;
            filter: drop-shadow(0 0 10px rgba(255,235,59,0.5));
            animation: starPulse 2s ease-in-out infinite;
        }
        @keyframes starPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.1); filter: brightness(1.3); }
        }

        .star-collected { 
            animation: collectAnim 0.5s ease-out forwards;
        }
        @keyframes collectAnim {
            to { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        .particle { 
            position: absolute; 
            pointer-events: none; 
            border-radius: 50%; 
            background: linear-gradient(to bottom, #fff, #ffeb3b, #f44336);
            z-index: 80;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center relative h-screen">
    
    <div class="space-bg"></div>
    <div class="stars-overlay"></div>

    <!-- 戻るボタン -->
    <button onclick="parent.postMessage('closeGame', '*')" class="absolute top-2 left-2 md:top-4 md:left-4 z-[1000] bg-white/10 hover:bg-white/20 text-white px-6 py-3 rounded-full font-black shadow-lg backdrop-blur-md transition-all border border-white/20 active:scale-95">
        ◀ もどる
    </button>

    <div id="game-container" class="w-full flex-1 relative overflow-hidden">
        <div id="game-stage" class="w-full h-full relative pointer-events-none">
            <div id="instruction-area" class="absolute top-8 left-0 w-full text-center z-[500] pointer-events-none">
                <h1 id="instruction" class="text-3xl md:text-4xl font-black text-yellow-300 drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)]">
                    おほしさまを ぜんぶ あつめよう！
                </h1>
            </div>

            <div id="rocket" class="rocket pointer-events-auto">🚀</div>
        </div>
    </div>

    <!-- 終了画面オーバーレイ -->
    <div id="finish-overlay" class="hidden absolute inset-0 bg-black/80 backdrop-blur-xl flex flex-col items-center justify-center z-[2000]">
        <h2 class="text-4xl sm:text-5xl md:text-7xl font-black text-yellow-400 animate-bounce mb-12 drop-shadow-[0_0_30px_rgba(250,204,21,0.8)]">だいせいこう！</h2>
        
        <div id="sticker-selection" class="w-full max-w-2xl text-center">
            <p class="text-3xl font-black text-white mb-10 bg-indigo-600/50 py-4 rounded-full mx-8 border-2 border-indigo-400 shadow-2xl">
                ごほうびシールを えらんでね！
            </p>
            <div id="sticker-choices" class="flex justify-center gap-8 mb-16"></div>
        </div>

        <div id="after-selection" class="hidden flex flex-col items-center">
            <p class="text-4xl font-black text-yellow-400 mb-12 drop-shadow-lg">シールをゲットしたよ！</p>
            <div class="flex flex-col sm:flex-row gap-4 sm:gap-8 w-full px-4 justify-center items-center">
                <a href="../../sticker_book.html?autoplay=1" class="px-6 py-4 md:px-10 md:py-6 w-full sm:w-auto text-center justify-center bg-white text-indigo-700 text-xl md:text-3xl font-black rounded-full shadow-[0_10px_0_#ccc] hover:translate-y-1 hover:shadow-[0_6px_0_#ccc] transition-all active:translate-y-2 active:shadow-none">📕 シールちょう</a>
                <button onclick="location.reload()" class="px-6 py-4 md:px-10 md:py-6 w-full sm:w-auto text-center justify-center bg-yellow-400 text-black text-xl md:text-3xl font-black rounded-full shadow-[0_10px_0_#c6a100] hover:translate-y-1 hover:shadow-[0_6px_0_#c6a100] transition-all active:translate-y-2 active:shadow-none">もういっかい！</button>
            </div>
        </div>
    </div>

    <script src="../../static/common/js/game_utils.js"></script>
    <script src="../../static/common/js/sticker_system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
