<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ほしあつめロケット - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../static/common/css/game_style.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="flex flex-col items-center justify-center relative" style="background:#000022;overflow:hidden;margin:0;min-height:100vh;">
    
    <div class="space-bg"></div>
    <div class="stars-overlay"></div>

    <button onclick="parent.postMessage('closeGame', '*')" class="space-back-btn">◀ もどる</button>

    <div id="game-container" class="w-full flex-1 relative overflow-hidden">
        <div id="game-stage" class="w-full h-full relative pointer-events-none">
            <div id="instruction-area" class="absolute top-6 left-0 w-full text-center z-[500] pointer-events-none">
                <h1 id="instruction" class="text-xl md:text-3xl lg:text-4xl font-black text-yellow-300 drop-shadow-[0_4px_4px_rgba(0,0,0,0.5)]">
                    おほしさまを ぜんぶ あつめよう！
                </h1>
            </div>

            <div id="rocket" class="rocket pointer-events-auto">
                <svg viewBox="0 0 64 80" fill="none" width="100%" height="100%">
                    <path d="M32,4 Q16,20 16,48 L22,54 L26,48 L38,48 L42,54 L48,48 Q48,20 32,4Z" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1.5"/>
                    <path d="M32,4 Q24,16 22,36 L32,8 L42,36 Q40,16 32,4Z" fill="#f5f5f5" opacity="0.5"/>
                    <circle cx="32" cy="30" r="8" fill="#42a5f5" stroke="#1e88e5" stroke-width="1.5"/>
                    <circle cx="32" cy="30" r="5" fill="#90caf9"/>
                    <path d="M16,48 L10,58 L22,54Z" fill="#e53935"/>
                    <path d="M48,48 L54,58 L42,54Z" fill="#e53935"/>
                    <path d="M26,48 L24,64 Q28,72 32,76 Q36,72 40,64 L38,48Z" fill="#ff8f00"/>
                    <path d="M30,48 L29,60 Q32,68 35,60 L34,48Z" fill="#ffee58"/>
                </svg>
            </div>
        </div>
    </div>

    <!-- 終了画面オーバーレイ -->
    <div id="finish-overlay" class="space-finish-overlay">
        <h2 class="text-3xl sm:text-4xl md:text-6xl font-black text-yellow-400 animate-bounce mb-8 md:mb-12 drop-shadow-[0_0_30px_rgba(250,204,21,0.8)]">だいせいこう！</h2>
        
        <div id="sticker-selection" class="w-full max-w-2xl text-center">
            <p class="text-xl md:text-2xl font-black text-white mb-8 bg-indigo-600/50 py-3 rounded-full mx-6 border-2 border-indigo-400 shadow-2xl">
                ごほうびシールを えらんでね！
            </p>
            <div id="sticker-choices" class="flex justify-center gap-4 md:gap-8 mb-12 px-4"></div>
        </div>

        <div id="after-selection" class="hidden flex flex-col items-center">
            <p class="text-2xl md:text-4xl font-black text-yellow-400 mb-10 drop-shadow-lg">シールをゲットしたよ！</p>
            <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 w-full px-6 justify-center items-center">
                <a href="../../sticker_book.html?autoplay=1" class="btn-outline" style="color:#3949ab;border-color:#5c6bc0;--theme-color-border:#9fa8da;">📕 シールちょう</a>
                <button onclick="location.reload()" class="btn-primary" style="background:#fdd835;color:#000;--theme-color-dark:#c6a100;">もういっかい！</button>
            </div>
        </div>
    </div>

    <script src="../../static/common/js/game_utils.js"></script>
    <script src="../../static/common/js/sticker_system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
