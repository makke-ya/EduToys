<link rel="stylesheet" href="games/003_hiragana_suisui/css/style.css">

<div id="hiragana-suisui-app" class="w-full h-full flex flex-col relative">
    <div class="absolute inset-x-0 top-0 z-10 p-3 md:p-4 pointer-events-none">
        <div class="flex items-start justify-between gap-3">
                <div id="ui-instruction-label" class="hiragana-chip hiragana-chip--instruction pointer-events-auto">
                    みどりの まるを すいすい うごかしてね！
                </div>
            <div class="hiragana-status pointer-events-auto">
                <div id="ui-letter-label" class="hiragana-status__letter">あ</div>
                <div id="ui-progress-label" class="hiragana-status__progress">1 / 3</div>
            </div>
        </div>
    </div>

    <div id="trace-banner" class="hiragana-banner hidden opacity-0">
        <span id="trace-banner-text">いいね！</span>
    </div>

    <div id="clear-overlay" class="absolute inset-0 bg-white/80 backdrop-blur-sm z-50 flex-col items-center justify-center hidden pointer-events-auto transition-opacity duration-500 opacity-0">
        <h2 class="text-5xl font-bold text-edu-orange mb-6 drop-shadow-md animate-bounce">クリア！</h2>
        <p id="reward-message" class="text-2xl text-edu-text font-bold mb-6 text-center px-6">ごほうび シールを えらんでね！</p>
        <div id="reward-sticker-options" class="reward-sticker-grid"></div>
        <div id="reward-action-row" class="reward-action-row hidden">
            <button id="btn-open-sticker-book" class="edu-btn bg-edu-pink text-white px-8 py-4 rounded-full text-2xl font-bold shadow-lg">
                シールちょう
            </button>
            <button id="btn-replay" class="edu-btn bg-white text-edu-orange px-8 py-4 rounded-full text-2xl font-bold shadow-lg border-4 border-edu-orange">
                もういっかい！
            </button>
        </div>
    </div>

    <div class="absolute inset-x-0 bottom-3 z-10 flex justify-center pointer-events-none">
        <div class="hiragana-credit">VOICEVOX:四国めたん</div>
    </div>
</div>

<script src="games/003_hiragana_suisui/js/letter-data.js"></script>
<script src="games/003_hiragana_suisui/js/trace-engine.js"></script>
<script src="games/003_hiragana_suisui/js/game.js"></script>
