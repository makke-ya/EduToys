<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>すうじをなぞろう - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../static/common/css/game_style.css">
    <style>
        #svg-canvas { touch-action: none; cursor: crosshair; }
        .guide-arrow { pointer-events: none; }
        .success-bounce { animation: bounce 0.5s infinite; }
    </style>
</head>
<body class="bg-pink-100 overflow-hidden flex flex-col items-center justify-center h-screen relative">
    
    <!-- 戻るボタン -->
    <button onclick="parent.postMessage('closeGame', '*')" class="absolute top-4 left-4 z-[1000] bg-white/80 text-gray-700 px-6 py-3 rounded-full font-black shadow-lg backdrop-blur-md transition-all border border-white/20 active:scale-95 hover:bg-white">
        ◀ もどる
    </button>

    <div id="game-container" class="relative w-full max-w-2xl h-[80vh] bg-white rounded-3xl shadow-xl border-8 border-pink-400 overflow-hidden m-4">
        <div id="header" class="absolute top-4 left-0 w-full text-center z-10">
            <h1 id="instruction" class="text-3xl font-black text-pink-500 bg-white/90 inline-block px-6 py-2 rounded-full shadow-md border-2 border-pink-100">
                すうじを なぞろう！
            </h1>
        </div>
        
        <div id="tracing-stage" class="w-full h-full relative p-12 pt-20 flex items-center justify-center">
            <svg id="svg-canvas" viewBox="0 0 109 109" class="w-full h-full max-w-[500px]">
                <!-- 背景ガイド（極太） -->
                <path id="bg-path" d="" fill="none" stroke="#fce4ec" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
                <!-- なぞり済みパス -->
                <g id="completed-paths" fill="none" stroke="#ff4081" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"></g>
                <!-- ガイドパス（点線） -->
                <path id="guide-path" d="" fill="none" stroke="#f8bbd0" stroke-width="2" stroke-dasharray="2,2" stroke-linecap="round" />
                <!-- なぞった跡（着色） -->
                <path id="traced-path" d="" fill="none" stroke="#ffeb3b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
                <!-- ターゲット地点 -->
                <circle id="target-dot" cx="0" cy="0" r="4" fill="#ff4081" class="hidden" />
            </svg>
            
            <!-- 数字の文字そのもの（判定完了後に表示） -->
            <div id="result-char" class="hidden absolute text-[250px] font-black text-orange-500 drop-shadow-xl select-none">1</div>
        </div>

        <!-- 終了画面オーバーレイ -->
        <div id="finish-overlay" class="hidden absolute inset-0 bg-white/95 flex flex-col items-center justify-center z-[2000] backdrop-blur-sm">
            <h2 class="text-6xl md:text-8xl font-black text-pink-500 animate-bounce mb-12 drop-shadow-[0_4px_10px_rgba(236,72,153,0.3)]">よくできました！</h2>
            <div id="sticker-selection" class="w-full max-w-2xl text-center">
                <p class="text-3xl font-black text-gray-700 mb-10 bg-yellow-200/80 py-4 rounded-full mx-8 border-4 border-yellow-300 shadow-lg">
                    すきなシールを えらんでね！
                </p>
                <div id="sticker-choices" class="flex justify-center gap-8 mb-16"></div>
            </div>
            <div id="after-selection" class="hidden flex flex-col items-center">
                <p class="text-4xl font-black text-orange-500 mb-12 drop-shadow-md">シールをゲットしたよ！</p>
                <div class="flex gap-8">
                    <a href="../../sticker_book.html?autoplay=1" class="px-10 py-6 bg-white text-orange-500 border-4 border-orange-400 text-3xl font-black rounded-full shadow-[0_10px_0_#fb923c] hover:translate-y-1 hover:shadow-[0_6px_0_#fb923c] transition-all active:translate-y-2 active:shadow-none">📕 シールちょう</a>
                    <button onclick="location.reload()" class="px-10 py-6 bg-pink-400 text-white text-3xl font-black rounded-full shadow-[0_10px_0_#f472b6] hover:translate-y-1 hover:shadow-[0_6px_0_#f472b6] transition-all active:translate-y-2 active:shadow-none">もういっかい！</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../static/common/js/game_utils.js"></script>
    <script src="../../static/common/js/sticker_system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
