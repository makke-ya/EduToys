<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>すうじをなぞろう - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../static/common/css/game_style.css">
    <style>
        #svg-canvas { touch-action: none; cursor: crosshair; }
        .guide-arrow { pointer-events: none; }
        .success-bounce { animation: bounce 0.5s infinite; }
    </style>
</head>
<body class="bg-pink-100 overflow-hidden flex flex-col items-center justify-center h-screen relative">
    
    <!-- 戻るボタン -->
    <button onclick="parent.postMessage('closeGame', '*')" class="absolute top-4 left-4 z-40 bg-white/80 text-gray-700 px-4 py-2 rounded-full font-bold shadow-sm hover:bg-white transition-colors border-2 border-pink-200">
        ◀ もどる
    </button>

    <div id="game-container" class="relative w-full max-w-2xl h-[80vh] bg-white rounded-3xl shadow-xl border-8 border-pink-400 overflow-hidden m-4">
        <div id="header" class="absolute top-4 left-0 w-full text-center z-10">
            <h1 id="instruction" class="text-3xl font-bold text-pink-500 bg-white/80 inline-block px-6 py-2 rounded-full shadow-md">
                すうじを なぞろう！
            </h1>
        </div>
        
        <div id="tracing-stage" class="w-full h-full relative p-12 flex items-center justify-center">
            <svg id="svg-canvas" viewBox="0 0 100 100" class="w-full h-full max-w-[500px]">
                <!-- 背景ガイド（極太） -->
                <path id="bg-path" d="" fill="none" stroke="#fce4ec" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
                <!-- ガイドパス（点線） -->
                <path id="guide-path" d="" fill="none" stroke="#f8bbd0" stroke-width="2" stroke-dasharray="2,2" stroke-linecap="round" />
                <!-- ユーザーが描くパス -->
                <path id="user-path" d="" fill="none" stroke="orange" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
                <!-- ターゲット地点 -->
                <circle id="target-dot" cx="0" cy="0" r="4" fill="#ff4081" class="hidden" />
            </svg>
            
            <!-- 数字の文字そのもの（判定完了後に表示） -->
            <div id="result-char" class="hidden absolute text-[200px] font-black text-orange-500 drop-shadow-xl select-none">1</div>
        </div>

        <!-- 終了画面オーバーレイ -->
        <div id="finish-overlay" class="hidden absolute inset-0 bg-white/95 flex flex-col items-center justify-center z-50">
            <h2 class="text-5xl md:text-6xl font-black text-pink-500 animate-bounce mb-4">よくできました！</h2>
            <div id="sticker-selection" class="w-full max-w-xl text-center">
                <p class="text-2xl font-bold text-gray-700 mb-6 bg-yellow-100 py-2 rounded-full mx-8 border-2 border-yellow-300">
                    シールを 1つ えらんでね！
                </p>
                <div id="sticker-choices" class="flex justify-center gap-6 mb-8"></div>
            </div>
            <div id="after-selection" class="hidden flex flex-col items-center">
                <p class="text-2xl font-bold text-orange-500 mb-8">シールをゲットしたよ！</p>
                <div class="flex gap-4">
                    <a href="../../sticker_book.html?autoplay=1" class="px-6 py-4 bg-white text-orange-500 border-4 border-orange-400 text-xl font-bold rounded-full shadow-lg">📕 シールちょう</a>
                    <button onclick="location.reload()" class="px-6 py-4 bg-orange-400 text-white text-xl font-bold rounded-full shadow-lg">もういっかい！</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../static/common/js/game_utils.js"></script>
    <script src="../../static/common/js/sticker_system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
