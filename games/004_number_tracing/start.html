<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>すうじをなぞろう - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../static/common/css/game_style.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-body" style="--theme-color:#ec407a;--theme-color-light:#fce4ec;--theme-color-border:#f48fb1;--theme-color-dark:#c2185b;">
    
    <button onclick="parent.postMessage('closeGame', '*')" class="game-back-btn">◀ もどる</button>

    <div id="game-container" class="game-container">
        <div id="header" class="game-header">
            <h1 id="instruction">すうじを なぞろう！</h1>
        </div>
        
        <div id="tracing-stage" class="w-full h-full relative p-8 md:p-12 pt-16 md:pt-20 flex items-center justify-center">
            <svg id="svg-canvas" viewBox="0 0 109 109" class="tracing-canvas w-full h-full max-w-[500px]">
                <!-- 背景ガイド（極太） -->
                <path id="bg-path" d="" fill="none" stroke="#fce4ec" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
                <!-- なぞり済みパス -->
                <g id="completed-paths" fill="none" stroke="#ff4081" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"></g>
                <!-- ガイドパス（点線） -->
                <path id="guide-path" d="" fill="none" stroke="#f8bbd0" stroke-width="2" stroke-dasharray="2,2" stroke-linecap="round" />
                <!-- なぞった跡（着色） -->
                <path id="traced-path" d="" fill="none" stroke="#ffeb3b" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
                <!-- ターゲット地点 -->
                <circle id="target-dot" cx="0" cy="0" r="10" fill="#ff4081" class="hidden" />
            </svg>
            
            <!-- 数字の文字そのもの（判定完了後に表示） -->
            <div id="result-char" class="hidden absolute text-[200px] md:text-[250px] font-black drop-shadow-xl select-none" style="color:var(--theme-color);">1</div>
        </div>

        <!-- 終了画面オーバーレイ -->
        <div id="finish-overlay" class="finish-overlay">
            <h2 class="finish-title">よくできました！</h2>
            <div id="sticker-selection" class="w-full max-w-2xl text-center">
                <p class="text-xl sm:text-2xl md:text-3xl font-black mb-8 py-3 rounded-full mx-6 border-4 shadow-md" style="color:var(--color-text);background:var(--theme-color-light);border-color:var(--theme-color-border);">
                    すきなシールを えらんでね！
                </p>
                <div id="sticker-choices" class="flex justify-center gap-4 md:gap-8 mb-12 px-4"></div>
            </div>
            <div id="after-selection" class="hidden flex flex-col items-center">
                <p class="text-2xl sm:text-3xl md:text-4xl font-black mb-10 drop-shadow-md" style="color:var(--color-primary);">シールをゲットしたよ！</p>
                <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 w-full px-6 justify-center items-center">
                    <a href="../../sticker_book.html?autoplay=1" class="btn-outline">📕 シールちょう</a>
                    <button onclick="location.reload()" class="btn-primary">もういっかい！</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../static/common/js/game_utils.js"></script>
    <script src="../../static/common/js/sticker_system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
