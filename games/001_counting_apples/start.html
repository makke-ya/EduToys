<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>かずをかぞえよう - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="../../static/common/css/game_style.css">
</head>
<body class="bg-blue-100 overflow-hidden flex flex-col items-center justify-center h-screen relative">
    
    <!-- 戻るボタン -->
    <button onclick="parent.postMessage('closeGame', '*')" class="absolute top-4 left-4 z-[1000] bg-white/80 text-gray-700 px-6 py-3 rounded-full font-black shadow-lg backdrop-blur-md transition-all border border-white/20 active:scale-95 hover:bg-white">
        ◀ もどる
    </button>

    <div id="game-container" class="relative w-full max-w-2xl h-[80vh] bg-white rounded-3xl shadow-xl border-8 border-yellow-400 overflow-hidden m-4">
        <div id="header" class="absolute top-4 left-0 w-full text-center z-10">
            <h1 id="instruction" class="text-3xl font-black text-red-500 bg-white/90 inline-block px-6 py-2 rounded-full shadow-md border-2 border-red-100">
                リンゴを タップ してね！
            </h1>
        </div>
        
        <div id="apple-stage" class="w-full h-full relative pt-16">
            <!-- リンゴがここに配置される -->
        </div>

        <!-- カゴの追加 -->
        <div id="basket" class="absolute bottom-4 left-6 text-7xl drop-shadow-lg transition-transform duration-300 z-10">
            🧺
        </div>

        <div id="footer" class="absolute bottom-4 right-6">
            <div id="counter" class="text-6xl font-black text-orange-500 bg-white px-6 py-3 rounded-[32px] border-4 border-orange-300 shadow-inner">
                0
            </div>
        </div>

        <!-- 終了画面オーバーレイ -->
        <div id="finish-overlay" class="hidden absolute inset-0 bg-white/95 flex flex-col items-center justify-center z-[2000] backdrop-blur-sm">
            <h2 class="text-6xl md:text-8xl font-black text-pink-500 animate-bounce mb-12 drop-shadow-[0_4px_10px_rgba(236,72,153,0.3)]">よくできました！</h2>
            
            <div id="sticker-selection" class="w-full max-w-2xl text-center">
                <p class="text-3xl font-black text-gray-700 mb-10 bg-yellow-200/80 py-4 rounded-full mx-8 border-4 border-yellow-300 shadow-lg">
                    すきなシールを えらんでね！
                </p>
                <div id="sticker-choices" class="flex justify-center gap-8 mb-16">
                    <!-- シールが動的に生成されます -->
                </div>
            </div>

            <div id="after-selection" class="hidden flex flex-col items-center">
                <p class="text-4xl font-black text-orange-500 mb-12 drop-shadow-md">シールをゲットしたよ！</p>
                <div class="flex gap-8">
                    <a href="../../sticker_book.html?autoplay=1" class="px-10 py-6 bg-white text-orange-500 border-4 border-orange-400 text-3xl font-black rounded-full shadow-[0_10px_0_#fb923c] hover:translate-y-1 hover:shadow-[0_6px_0_#fb923c] transition-all active:translate-y-2 active:shadow-none">
                        📕 シールちょう
                    </a>
                    <button onclick="location.reload()" class="px-10 py-6 bg-yellow-400 text-white text-3xl font-black rounded-full shadow-[0_10px_0_#eab308] hover:translate-y-1 hover:shadow-[0_6px_0_#eab308] transition-all active:translate-y-2 active:shadow-none">
                        もういっかい！
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../static/common/js/game_utils.js"></script>
    <script src="../../static/common/js/sticker_system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
