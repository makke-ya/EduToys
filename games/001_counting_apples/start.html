<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>かずをかぞえよう - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../static/common/css/game_style.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-body" style="--theme-color:#ef5350;--theme-color-light:#ffebee;--theme-color-border:#ef9a9a;--theme-color-dark:#c62828;">
    
    <button onclick="parent.postMessage('closeGame', '*')" class="game-back-btn">◀ もどる</button>

    <div id="game-container" class="game-container">
        <div id="header" class="game-header">
            <h1 id="instruction">リンゴを タップ してね！</h1>
        </div>
        
        <div id="apple-stage" class="w-full h-full relative pt-16">
            <!-- アイテムがここに配置される -->
        </div>

        <!-- カゴ -->
        <div id="basket" class="absolute bottom-4 left-4 md:left-6 z-10 transition-transform duration-300">
            <svg class="w-16 h-16 md:w-20 md:h-20" viewBox="0 0 80 80" fill="none">
                <path d="M10,35 Q10,30 15,28 L65,28 Q70,30 70,35 L68,65 Q67,72 60,72 L20,72 Q13,72 12,65 Z" fill="#d4a574" stroke="#b8845a" stroke-width="2"/>
                <path d="M10,35 L70,35" stroke="#b8845a" stroke-width="2"/>
                <path d="M15,35 L18,65 M30,35 L31,65 M50,35 L49,65 M65,35 L62,65" stroke="#c4956a" stroke-width="1.5" opacity="0.5"/>
                <path d="M25,28 Q40,10 55,28" fill="none" stroke="#b8845a" stroke-width="3" stroke-linecap="round"/>
            </svg>
        </div>

        <div id="footer" class="absolute bottom-3 right-4 md:right-6">
            <div id="counter" class="text-5xl md:text-6xl font-black bg-white px-5 py-2.5 md:px-6 md:py-3 rounded-[32px] border-4 shadow-inner select-none" style="color:var(--theme-color);border-color:var(--theme-color-border);">
                0
            </div>
        </div>

        <!-- 終了画面オーバーレイ -->
        <div id="finish-overlay" class="finish-overlay">
            <h2 class="finish-title">よくできました！</h2>
            
            <div id="sticker-selection" class="w-full max-w-2xl text-center">
                <p class="text-xl sm:text-2xl md:text-3xl font-black mb-8 py-3 rounded-full mx-6 border-4 shadow-md" style="color:var(--color-text);background:var(--theme-color-light);border-color:var(--theme-color-border);">
                    すきなシールを えらんでね！
                </p>
                <div id="sticker-choices" class="flex justify-center gap-4 md:gap-8 mb-12 px-4"></div>
            </div>

            <div id="after-selection" class="hidden flex flex-col items-center">
                <p class="text-2xl sm:text-3xl md:text-4xl font-black mb-10 drop-shadow-md" style="color:var(--color-primary);">シールをゲットしたよ！</p>
                <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 w-full px-6 justify-center items-center">
                    <a href="../../sticker_book.html?autoplay=1" class="btn-outline">📕 シールちょう</a>
                    <button onclick="location.reload()" class="btn-primary">もういっかい！</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../static/common/js/game_utils.js"></script>
    <script src="../../static/common/js/sticker_system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
