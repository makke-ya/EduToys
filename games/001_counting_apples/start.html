<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>かずをかぞえよう - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-blue-100 overflow-hidden flex flex-col items-center justify-center h-screen">
    <div id="game-container" class="relative w-full max-w-2xl h-[80vh] bg-white rounded-3xl shadow-xl border-8 border-yellow-400 overflow-hidden m-4">
        <div id="header" class="absolute top-4 left-0 w-full text-center">
            <h1 id="instruction" class="text-3xl font-bold text-red-500 bg-white/80 inline-block px-6 py-2 rounded-full shadow-md">
                リンゴを タップ してね！
            </h1>
        </div>
        
        <div id="apple-stage" class="w-full h-full relative">
            <!-- リンゴがここに配置される -->
        </div>

        <div id="footer" class="absolute bottom-4 right-6">
            <div id="counter" class="text-5xl font-black text-orange-500 bg-white px-4 py-2 rounded-2xl border-4 border-orange-300 shadow-inner">
                0
            </div>
        </div>

        <!-- 終了画面オーバーレイ -->
        <div id="finish-overlay" class="hidden absolute inset-0 bg-white/90 flex flex-col items-center justify-center z-50">
            <h2 class="text-6xl font-black text-pink-500 animate-bounce mb-8">よくできました！</h2>
            <div class="text-8xl">🍎🍎🍎</div>
            <button onclick="location.reload()" class="mt-12 px-8 py-4 bg-yellow-400 hover:bg-yellow-500 text-white text-3xl font-bold rounded-full shadow-lg transition-transform active:scale-95">
                もういっかい！
            </button>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
