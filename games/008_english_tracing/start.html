<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>えいごなぞり - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../static/common/css/game_style.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-body" style="--theme-color:#0284c7;--theme-color-light:#e0f2fe;--theme-color-border:#7dd3fc;--theme-color-dark:#0369a1;">
    
    <button onclick="parent.postMessage('closeGame', '*')" class="game-back-btn">◀ もどる</button>

    <div id="game-container" class="game-container">
        <div id="header" class="game-header" style="display:flex;flex-direction:column;align-items:center;gap:0.5rem;">
            <h1 id="instruction">えいごを なぞろう！</h1>
            <div id="word-progress" class="flex gap-4 text-5xl font-black uppercase drop-shadow-sm bg-white/80 px-6 py-2 rounded-full border-2" style="color:#ccc;border-color:var(--theme-color-light);">
                <!-- JavaScriptでA aが追加されます -->
            </div>
        </div>
        
        <div id="tracing-stage" class="w-full h-full relative p-8 md:p-12 pt-20 md:pt-24 flex items-center justify-center">
            <svg id="svg-canvas" viewBox="0 0 109 109" class="tracing-canvas w-full h-full max-w-[500px]">
                <path id="bg-path" d="" fill="none" stroke="#e0f2fe" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
                <g id="completed-paths" fill="none" stroke="#fbbf24" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"></g>
                <path id="guide-path" d="" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-dasharray="2,2" stroke-linecap="round" />
                <path id="traced-path" d="" fill="none" stroke="#0ea5e9" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
                <circle id="target-dot" cx="0" cy="0" r="10" fill="#0284c7" class="hidden" />
            </svg>
            
            <div id="result-char" class="hidden absolute text-[200px] md:text-[250px] font-black drop-shadow-xl select-none" style="color:var(--theme-color);">A</div>
        </div>

        <!-- 単語完成時のイラスト演出 -->
        <div id="word-finish-overlay" class="hidden absolute inset-0 bg-white/90 flex flex-col items-center justify-center z-[1500] backdrop-blur-sm">
            <div id="word-emoji" class="text-[10rem] md:text-[12rem] animate-bounce drop-shadow-2xl mb-6 md:mb-8">🍎</div>
            <div id="word-text" class="text-4xl md:text-6xl font-black tracking-widest uppercase drop-shadow-md bg-white px-8 md:px-12 py-3 md:py-4 rounded-[40px] border-4" style="color:var(--theme-color);border-color:var(--theme-color-border);">APPLE</div>
        </div>

        <!-- 終了画面オーバーレイ -->
        <div id="finish-overlay" class="finish-overlay">
            <h2 class="finish-title">よくできました！</h2>
            <div id="sticker-selection" class="w-full max-w-2xl text-center">
                <p class="text-xl sm:text-2xl md:text-3xl font-black mb-8 py-3 rounded-full mx-6 border-4 shadow-md" style="color:var(--color-text);background:var(--theme-color-light);border-color:var(--theme-color-border);">
                    すきなシールを えらんでね！
                </p>
                <div id="sticker-choices" class="flex justify-center gap-4 md:gap-8 mb-12 px-4"></div>
            </div>
            <div id="after-selection" class="hidden flex flex-col items-center">
                <p class="text-2xl sm:text-3xl md:text-4xl font-black mb-10 drop-shadow-md" style="color:var(--color-primary);">シールをゲットしたよ！</p>
                <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 w-full px-6 justify-center items-center">
                    <a href="../../sticker_book.html?autoplay=1" class="btn-outline">📕 シールちょう</a>
                    <button onclick="location.reload()" class="btn-primary">もういっかい！</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../static/common/js/game_utils.js"></script>
    <script src="../../static/common/js/sticker_system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
