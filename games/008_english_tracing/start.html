<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>えいごなぞり - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../static/common/css/game_style.css">
    <style>
        #svg-canvas { touch-action: none; cursor: crosshair; }
        .guide-arrow { pointer-events: none; }
        .success-bounce { animation: bounce 0.5s infinite; }
    </style>
</head>
<body class="bg-cyan-100 overflow-hidden flex flex-col items-center justify-center h-screen relative">
    
    <!-- 戻るボタン -->
    <button onclick="parent.postMessage('closeGame', '*')" class="absolute top-2 left-2 md:top-4 md:left-4 z-[1000] bg-white/80 text-gray-700 px-4 py-2 md:px-6 md:py-3 text-sm md:text-base rounded-full font-black shadow-lg backdrop-blur-md transition-all border border-white/20 active:scale-95 hover:bg-white">
        ◀ もどる
    </button>

    <div id="game-container" class="relative w-full max-w-2xl h-[80vh] bg-white rounded-3xl shadow-xl border-8 border-cyan-400 overflow-hidden mt-14 mb-4 mx-4 md:m-4">
        <div id="header" class="absolute top-4 left-0 w-full text-center z-10 flex flex-col items-center gap-2">
            <h1 id="instruction" class="text-3xl font-black text-cyan-600 bg-white/90 inline-block px-4 py-1 md:px-6 md:py-2 rounded-full shadow-md border-2 border-cyan-100">
                えいごを なぞろう！
            </h1>
            <!-- 単語の進行状況 -->
            <div id="word-progress" class="flex gap-4 text-5xl font-black text-gray-300 drop-shadow-sm bg-white/80 px-6 py-2 rounded-full border-2 border-gray-100 uppercase">
                <!-- JavaScriptでA aが追加されます -->
            </div>
        </div>
        
        <div id="tracing-stage" class="w-full h-full relative p-12 pt-24 flex items-center justify-center">
            <svg id="svg-canvas" viewBox="0 0 109 109" class="w-full h-full max-w-[500px]">
                <!-- 背景ガイド（極太） -->
                <path id="bg-path" d="" fill="none" stroke="#e0f2fe" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" />
                <!-- なぞり済みパス -->
                <g id="completed-paths" fill="none" stroke="#0ea5e9" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"></g>
                <!-- ガイドパス（点線） -->
                <path id="guide-path" d="" fill="none" stroke="#7dd3fc" stroke-width="2" stroke-dasharray="2,2" stroke-linecap="round" />
                <!-- なぞった跡（着色） -->
                <path id="traced-path" d="" fill="none" stroke="#fbbf24" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" />
                <!-- ターゲット地点 -->
                <circle id="target-dot" cx="0" cy="0" r="10" fill="#0284c7" class="hidden" />
            </svg>
            
            <!-- 文字そのもの（判定完了後に表示） -->
            <div id="result-char" class="hidden absolute text-[250px] font-black text-cyan-500 drop-shadow-xl select-none">A</div>
        </div>

        <!-- 単語完成時のイラスト演出 -->
        <div id="word-finish-overlay" class="hidden absolute inset-0 bg-white/90 flex flex-col items-center justify-center z-[1500] backdrop-blur-sm">
            <div id="word-emoji" class="text-[12rem] animate-bounce drop-shadow-2xl mb-8">🍎</div>
            <div id="word-text" class="text-6xl font-black text-cyan-600 uppercase tracking-widest drop-shadow-md bg-white px-12 py-4 rounded-[40px] border-4 border-cyan-200">APPLE</div>
        </div>

        <!-- 終了画面オーバーレイ -->
        <div id="finish-overlay" class="hidden absolute inset-0 bg-white/95 flex flex-col items-center justify-center z-[2000] backdrop-blur-sm">
            <h2 class="text-4xl sm:text-5xl md:text-7xl font-black text-pink-500 animate-bounce mb-12 drop-shadow-[0_4px_10px_rgba(236,72,153,0.3)]">よくできました！</h2>
            <div id="sticker-selection" class="w-full max-w-2xl text-center">
                <p class="text-xl sm:text-2xl md:text-3xl font-black text-gray-700 mb-10 bg-yellow-200/80 py-4 rounded-full mx-8 border-4 border-yellow-300 shadow-lg">
                    すきなシールを えらんでね！
                </p>
                <div id="sticker-choices" class="flex justify-center gap-8 mb-16"></div>
            </div>
            <div id="after-selection" class="hidden flex flex-col items-center">
                <p class="text-2xl sm:text-3xl md:text-4xl font-black text-orange-500 mb-12 drop-shadow-md">シールをゲットしたよ！</p>
                <div class="flex flex-col sm:flex-row gap-4 sm:gap-8 w-full px-4 justify-center items-center">
                    <a href="../../sticker_book.html?autoplay=1" class="px-6 py-4 md:px-10 md:py-6 w-full sm:w-auto text-center justify-center bg-white text-orange-500 border-4 border-orange-400 text-xl md:text-3xl font-black rounded-full shadow-[0_10px_0_#fb923c] hover:translate-y-1 hover:shadow-[0_6px_0_#fb923c] transition-all active:translate-y-2 active:shadow-none">📕 シールちょう</a>
                    <button onclick="location.reload()" class="px-6 py-4 md:px-10 md:py-6 w-full sm:w-auto text-center justify-center bg-cyan-500 text-white text-xl md:text-3xl font-black rounded-full shadow-[0_10px_0_#06b6d4] hover:translate-y-1 hover:shadow-[0_6px_0_#06b6d4] transition-all active:translate-y-2 active:shadow-none">もういっかい！</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../static/common/js/game_utils.js"></script>
    <script src="../../static/common/js/sticker_system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
