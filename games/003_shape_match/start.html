<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>かたちあわせ - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../static/common/css/game_style.css">
</head>
<body class="bg-yellow-100 overflow-hidden flex flex-col items-center justify-center h-screen relative">
    <button onclick="parent.postMessage('closeGame', '*')" class="absolute top-4 left-4 z-40 bg-white/80 text-gray-700 px-4 py-2 rounded-full font-bold shadow-sm hover:bg-white transition-colors">◀ もどる</button>

    <div id="game-container" class="relative w-full max-w-2xl h-[80vh] bg-white rounded-3xl shadow-xl border-8 border-yellow-400 overflow-hidden m-4">
        <div id="header" class="absolute top-4 left-0 w-full text-center">
            <h1 class="text-3xl font-bold text-yellow-500 bg-white/80 inline-block px-6 py-2 rounded-full shadow-md">おなじ かたちを さがそう！</h1>
        </div>
        
        <div id="stage" class="w-full h-full relative flex flex-col items-center justify-center gap-8">
            <!-- 影（シルエット） -->
            <div class="relative">
                <div id="silhouette-guide" class="absolute inset-0 border-4 border-dashed border-gray-300 rounded-full animate-pulse scale-110 pointer-events-none"></div>
                <div id="silhouette" class="text-[12rem] filter brightness-0 opacity-20 select-none drop-shadow-lg">❓</div>
            </div>
            
            <div class="text-2xl font-bold text-gray-400 mt-8 mb-4">⬇️ ここから えらんでね ⬇️</div>

            <!-- 選択肢 -->
            <div id="choices" class="flex gap-8 p-6 bg-white/50 rounded-3xl border-2 border-dashed border-gray-200">
                <!-- JavaScriptで選択肢が追加されます -->
            </div>
        </div>

        <div id="finish-overlay" class="hidden absolute inset-0 bg-white/95 flex flex-col items-center justify-center z-50">
            <h2 class="text-5xl md:text-6xl font-black text-pink-500 animate-bounce mb-4">よくできました！</h2>
            <div id="sticker-selection" class="w-full max-w-xl text-center">
                <p class="text-2xl font-bold text-gray-700 mb-6 bg-yellow-100 py-2 rounded-full mx-8 border-2 border-yellow-300">すきなシールを 1つ えらんでね！</p>
                <div id="sticker-choices" class="flex justify-center gap-6 mb-8"></div>
            </div>
            <div id="after-selection" class="hidden flex flex-col items-center">
                <p class="text-2xl font-bold text-orange-500 mb-8">シールをゲットしたよ！</p>
                <div class="flex gap-4">
                    <a href="../../sticker_book.html?autoplay=1" class="px-6 py-4 bg-white text-orange-500 border-4 border-orange-400 hover:bg-orange-50 text-xl font-bold rounded-full shadow-lg transition-transform active:scale-95">📕 シールちょう</a>
                    <button onclick="location.reload()" class="px-6 py-4 btn-bubbly transition-transform active:scale-95">もういっかい！</button>
                </div>
            </div>
        </div>
    </div>
    <script src="../../static/common/js/game_utils.js"></script>
    <script src="../../static/common/js/sticker_system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
