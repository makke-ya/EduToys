<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>どっちがおおい？ - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../static/common/css/game_style.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="game-body" style="--theme-color:#43a047;--theme-color-light:#e8f5e9;--theme-color-border:#a5d6a7;--theme-color-dark:#2e7d32;">
    
    <button onclick="parent.postMessage('closeGame', '*')" class="game-back-btn">◀ もどる</button>

    <div id="game-container" class="game-container">
        <div id="header" class="game-header">
            <h1 id="instruction">どっちが おおいかな？</h1>
        </div>
        
        <div id="stage" class="w-full h-full relative flex items-center justify-center gap-2 md:gap-6 px-2 md:px-4 pt-12 md:pt-16">
            <!-- 集合体1 -->
            <div id="item-left" class="compare-box compare-box-orange">
            </div>
            
            <div class="vs-label">VS</div>

            <!-- 集合体2 -->
            <div id="item-right" class="compare-box compare-box-blue">
            </div>
        </div>

        <!-- 終了画面オーバーレイ -->
        <div id="finish-overlay" class="finish-overlay">
            <h2 class="finish-title">よくできました！</h2>
            <div id="sticker-selection" class="w-full max-w-2xl text-center">
                <p class="text-xl sm:text-2xl md:text-3xl font-black mb-8 py-3 rounded-full mx-6 border-4 shadow-md" style="color:var(--color-text);background:var(--theme-color-light);border-color:var(--theme-color-border);">
                    すきなシールを えらんでね！
                </p>
                <div id="sticker-choices" class="flex justify-center gap-4 md:gap-8 mb-12 px-4"></div>
            </div>
            <div id="after-selection" class="hidden flex flex-col items-center">
                <p class="text-2xl sm:text-3xl md:text-4xl font-black mb-10 drop-shadow-md" style="color:var(--color-primary);">シールをゲットしたよ！</p>
                <div class="flex flex-col sm:flex-row gap-4 sm:gap-6 w-full px-6 justify-center items-center">
                    <a href="../../sticker_book.html?autoplay=1" class="btn-outline">📕 シールちょう</a>
                    <button onclick="location.reload()" class="btn-primary">もういっかい！</button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../static/common/js/game_utils.js"></script>
    <script src="../../static/common/js/sticker_system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
