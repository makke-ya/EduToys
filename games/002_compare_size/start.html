<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>おおきいのはどっち？ - EduToys</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../static/common/css/game_style.css">
</head>
<body class="bg-green-100 overflow-hidden flex flex-col items-center justify-center h-screen relative">
    <button onclick="parent.postMessage('closeGame', '*')" class="absolute top-2 left-2 md:top-4 md:left-4 z-[1000] bg-white/80 text-gray-700 px-4 py-2 md:px-6 md:py-3 text-sm md:text-base rounded-full font-black shadow-lg backdrop-blur-md transition-all border border-white/20 active:scale-95 hover:bg-white">◀ もどる</button>

    <div id="game-container" class="relative w-full max-w-2xl h-[80vh] bg-white rounded-3xl shadow-xl border-8 border-green-400 overflow-hidden mt-14 mb-4 mx-4 md:m-4">
        <div id="header" class="absolute top-4 left-0 w-full text-center z-10">
            <h1 id="instruction" class="text-lg md:text-2xl lg:text-3xl font-black text-green-500 bg-white/90 inline-block px-4 py-1 md:px-6 md:py-2 rounded-full shadow-md border-2 border-green-100">どっちが おおいかな？</h1>
        </div>
        
        <div id="stage" class="w-full h-full relative flex items-center justify-center gap-2 md:gap-6 px-2 md:px-4 pt-10 md:pt-16">
            <!-- 集合体1 -->
            <div id="item-left" class="flex-1 h-64 bg-orange-50 rounded-[40px] border-4 border-orange-200 flex items-center justify-center cursor-pointer hover:bg-orange-100 hover:scale-105 transition-all relative overflow-hidden p-1 md:p-4 shadow-sm">
            </div>
            
            <div class="text-3xl md:text-5xl font-black text-orange-300 select-none drop-shadow-sm">VS</div>

            <!-- 集合体2 -->
            <div id="item-right" class="flex-1 h-64 bg-blue-50 rounded-[40px] border-4 border-blue-200 flex items-center justify-center cursor-pointer hover:bg-blue-100 hover:scale-105 transition-all relative overflow-hidden p-1 md:p-4 shadow-sm">
            </div>
        </div>

        <div id="finish-overlay" class="hidden absolute inset-0 bg-white/95 flex flex-col items-center justify-center z-[2000] backdrop-blur-sm">
            <h2 class="text-4xl sm:text-5xl md:text-7xl font-black text-pink-500 animate-bounce mb-12 drop-shadow-[0_4px_10px_rgba(236,72,153,0.3)]">よくできました！</h2>
            <div id="sticker-selection" class="w-full max-w-2xl text-center">
                <p class="text-xl sm:text-2xl md:text-3xl font-black text-gray-700 mb-10 bg-yellow-200/80 py-4 rounded-full mx-8 border-4 border-yellow-300 shadow-lg">すきなシールを えらんでね！</p>
                <div id="sticker-choices" class="flex justify-center gap-8 mb-16"></div>
            </div>
            <div id="after-selection" class="hidden flex flex-col items-center">
                <p class="text-2xl sm:text-3xl md:text-4xl font-black text-orange-500 mb-12 drop-shadow-md">シールをゲットしたよ！</p>
                <div class="flex flex-col sm:flex-row gap-4 sm:gap-8 w-full px-4 justify-center items-center">
                    <a href="../../sticker_book.html?autoplay=1" class="px-6 py-4 md:px-10 md:py-6 w-full sm:w-auto text-center justify-center bg-white text-orange-500 border-4 border-orange-400 text-xl md:text-3xl font-black rounded-full shadow-[0_10px_0_#fb923c] hover:translate-y-1 hover:shadow-[0_6px_0_#fb923c] transition-all active:translate-y-2 active:shadow-none">📕 シールちょう</a>
                    <button onclick="location.reload()" class="px-6 py-4 md:px-10 md:py-6 w-full sm:w-auto text-center justify-center bg-green-400 text-white text-xl md:text-3xl font-black rounded-full shadow-[0_10px_0_#22c55e] hover:translate-y-1 hover:shadow-[0_6px_0_#22c55e] transition-all active:translate-y-2 active:shadow-none">もういっかい！</button>
                </div>
            </div>
        </div>
    </div>
    <script src="../../static/common/js/game_utils.js"></script>
    <script src="../../static/common/js/sticker_system.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
